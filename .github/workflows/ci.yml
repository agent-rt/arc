name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Controller + shared crates build on macOS/Linux. arc-runner is excluded:
  # it is Windows-only (xcap / windows-rs).
  host:
    name: check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      CRATES: "-p arc-proto -p arc-net -p arc-relay -p arc-cli"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy ${{ env.CRATES }} --all-targets
      - run: cargo test ${{ env.CRATES }}

  # arc-runner only compiles on Windows.
  windows:
    name: check / windows (runner)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p arc-runner --all-targets
